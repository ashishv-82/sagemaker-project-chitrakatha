name: "CT — Continuous Training"

on:
  push:
    branches: ["main"]
  # Can also be triggered via external event (e.g., S3 upload of new data)
  repository_dispatch:
    types: [trigger-training]
  workflow_dispatch:

permissions:
  id-token: write   # Required for AWS OIDC
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  training-pipeline:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || 'arn:aws:iam::111122223333:role/dummy' }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Fetch Terraform Outputs
        id: tf-outputs
        working-directory: infra/terraform
        run: |
          terraform init -input=false
          echo "SAGEMAKER_ROLE_ARN=$(terraform output -raw sagemaker_role_arn)" >> $GITHUB_ENV
          echo "BRONZE_BUCKET=$(terraform output -raw s3_bronze_bucket)" >> $GITHUB_ENV
          echo "SILVER_BUCKET=$(terraform output -raw s3_silver_bucket)" >> $GITHUB_ENV
          echo "GOLD_BUCKET=$(terraform output -raw s3_gold_bucket)" >> $GITHUB_ENV
          echo "KMS_KEY_ARN=$(terraform output -raw kms_key_arn)" >> $GITHUB_ENV
          echo "VECTORS_BUCKET=$(terraform output -raw s3_vectors_bucket)" >> $GITHUB_ENV
          echo "FAISS_INDEX_PREFIX=$(terraform output -raw s3_faiss_index_prefix)" >> $GITHUB_ENV

      - name: Trigger SageMaker Pipeline
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}
        run: |
          echo "Starting Chitrakatha Training Pipeline for $BRONZE_BUCKET..."
          python pipeline/pipeline.py --execute
